<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Akun Belajar.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <i class="fas fa-graduation-cap text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Akun Belajar.id</h1>
            <p class="text-slate-500 text-sm mt-1">Sistem Cek Akun Mandiri Siswa</p>
        </div>

        <!-- Main Card -->
        <div id="mainCard" class="bg-white rounded-3xl p-8 card-shadow border border-slate-100 transition-all duration-300">
            
            <!-- Tampilan Form -->
            <div id="formView">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">NISN</label>
                        <input type="text" id="nisn" placeholder="Masukkan 10 digit NISN" 
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Tanggal Lahir</label>
                        <input type="date" id="tgl_lahir" 
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>

                    <button onclick="prosesCari()" id="btnCari"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-2">
                        <span>Cek Akun Sekarang</span>
                        <i class="fas fa-search text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Tampilan Loading -->
            <div id="loadingView" class="hidden py-10 text-center">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent"></div>
                <p class="mt-4 text-slate-600 font-medium">Mencari data murid...</p>
            </div>

            <!-- Tampilan Hasil -->
            <div id="resultView" class="hidden">
                <div class="text-center mb-6">
                    <div class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fas fa-check"></i>
                    </div>
                    <h2 class="font-bold text-slate-800 text-lg" id="resNama">Nama Murid</h2>
                    <p class="text-slate-500 text-xs">Akun Aktif Ditemukan</p>
                </div>

                <div class="space-y-3">
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 relative">
                        <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1">Username</p>
                        <p class="text-slate-700 font-medium break-all pr-10" id="resUser">---</p>
                        <button onclick="copyContent('resUser')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 relative">
                        <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1">Password</p>
                        <p class="text-slate-700 font-medium pr-10" id="resPass">---</p>
                        <button onclick="copyContent('resPass')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600">
                            <i class="far fa-copy"></i>
                        </button>
                    </div>
                </div>

                <button onclick="kembaliKeForm()" class="mt-8 w-full py-3 text-slate-500 text-sm font-medium hover:text-blue-600 transition-colors">
                    <i class="fas fa-undo mr-2"></i> Kembali
                </button>
            </div>

            <!-- Tampilan Error -->
            <div id="errorView" class="hidden text-center py-6">
                <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h3 class="font-bold text-slate-800">Data Tidak Ditemukan</h3>
                <p class="text-slate-500 text-sm mt-2 px-4">Pastikan NISN dan Tanggal Lahir sudah benar sesuai data Dapodik.</p>
                <button onclick="kembaliKeForm()" class="mt-8 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition-all">
                    Coba Lagi
                </button>
            </div>
        </div>

        <p class="text-center text-slate-400 text-[10px] mt-8 uppercase tracking-widest font-bold">
            Data dikelola oleh Admin Sekolah
        </p>
    </div>

    <script>
        /**
         * PENTING: GANTI URL DI BAWAH INI DENGAN URL WEB APP ANDA
         */
        const APP_URL = "https://script.google.com/macros/s/AKfycbzd5KvtI4q-i56yUfugMeI93MDuObLMIsbfb1DNbKLWJUhHGu19GD5zShO3IrUJcQ/exec";

        function prosesCari() {
            const nisn = document.getElementById('nisn').value.trim();
            const tgl = document.getElementById('tgl_lahir').value;

            if (!nisn || !tgl) {
                alert("Mohon isi NISN dan Tanggal Lahir.");
                return;
            }

            showSection('loadingView');

            fetch(`${APP_URL}?nisn=${nisn}&tgl=${tgl}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        document.getElementById('resNama').innerText = data.nama;
                        document.getElementById('resUser').innerText = data.username;
                        document.getElementById('resPass').innerText = data.password;
                        showSection('resultView');
                    } else {
                        showSection('errorView');
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("Gagal terhubung ke database. Cek kembali URL Web App atau izin akses.");
                    kembaliKeForm();
                });
        }

        function showSection(id) {
            ['formView', 'loadingView', 'resultView', 'errorView'].forEach(sec => {
                document.getElementById(sec).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function kembaliKeForm() {
            document.getElementById('nisn').value = "";
            document.getElementById('tgl_lahir').value = "";
            showSection('formView');
        }

        function copyContent(id) {
            const text = document.getElementById(id).innerText;
            const temp = document.createElement('textarea');
            document.body.appendChild(temp);
            temp.value = text;
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("Berhasil disalin!");
        }
    </script>
</body>
</html>
